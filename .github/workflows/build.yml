name: Release-Build
on:
  push:
    tags: ["v*"] # v1.0.0 などのタグをプッシュすると発動
jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build EXE
        # 改行なしの1行コマンド。パスは src/CardGame.csproj を指定
        run: dotnet publish src/CardGame.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
