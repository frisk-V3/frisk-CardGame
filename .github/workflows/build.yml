name: Build and Release CardGame

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # v1.0.0 などのタグを飛ばした時も動くように追加
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # リリースを作成するために書き込み権限を明示
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/CardGame/CardGame.csproj

      - name: Publish EXE
        # 改行エラーを防ぐため1行で記述
        run: dotnet publish src/CardGame/CardGame.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      # 1. 従来の Artifact 保存（Actionsタブ用）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CardGame-Release-Windows
          path: ./publish/*.exe

      # 2. ★本命：Release ページにアップロード
      # タグが打たれた時、または手動実行時に Release を作成します
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
