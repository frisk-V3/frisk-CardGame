name: Auto Release CardGame

on:
  push:
    tags:
      - 'v*' # "v1.0" や "v2.1.3" などのタグがプッシュされたら発動

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # リリースを作成するために書き込み権限が必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Single-File EXE
        # リリース用に最適化されたビルド
        run: |
          dotnet publish src/CardGame/CardGame.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          # publishフォルダ内の.exeをすべてリリースに添付
          files: ./publish/*.exe
          # リリースのタイトル（タグ名と同じにする）
          name: Release ${{ github.ref_name }}
          # リリースの説明文
          body: |
            CardGame の最新ビルドです。
            100種類のカードと最新の戦闘ロジックを搭載。
            
            【実行方法】
            1. CardGame.exe をダウンロード
            2. そのまま実行（ランタイム不要）
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
